<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Dopamine Quest</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', system-ui, sans-serif;
    }
    .offline-card {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      border-radius: 2rem;
      padding: 2rem;
      text-align: center;
      max-width: 500px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%,100%{ transform: translateY(0px); }
      50%{ transform: translateY(-10px); }
    }
    .offline-icon {
      font-size: 5rem;
      color: #764ba2;
    }
  </style>
</head>
<body>
  <div class="offline-card shadow-2xl">
    <div class="offline-icon">📡</div>
    <h1 class="text-3xl font-bold mt-4 mb-2">Você está offline</h1>
    <p class="text-gray-600 mb-4">Mas não se preocupe! Seu progresso está salvo localmente.</p>
    <div class="bg-amber-50 p-4 rounded-xl mb-4">
      <i class="fas fa-gift text-amber-500"></i>
      <p class="text-sm mt-2">Enquanto espera a conexão voltar, que tal revisar suas metas ou abrir uma caixa surpresa já conquistada?</p>
    </div>
    <button onclick="window.location.href='/index.html'" class="bg-indigo-600 text-white px-6 py-3 rounded-full hover:bg-indigo-700 transition">
      <i class="fas fa-brain"></i> Tentar reconectar
    </button>
    <p class="text-xs text-gray-400 mt-4">O app será recarregado quando a conexão voltar</p>
  </div>
  
  <script>
    // Monitora quando a conexão voltar
    window.addEventListener('online', () => {
      window.location.href = '/index.html';
    });
  </script>
</body>
</html>
